name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend (required for go:embed)
        run: cd web && npm ci && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend (required for go:embed)
        run: cd web && npm ci && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Check coverage
        run: go tool cover -func=coverage.out

  sqlc:
    name: sqlc Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.30.0'
      - name: Verify generated code is current
        run: sqlc diff

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: kitt_test
          POSTGRES_USER: kitt
          POSTGRES_PASSWORD: kitt-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://kitt:kitt-test@localhost:5432/kitt_test?sslmode=disable
        run: go test -race -tags integration ./tests/...

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend (required for go:embed)
        run: cd web && npm ci && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Build
        run: npm run build

  smoke-benchmarks:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    # Only runs when benchmark sources change. The matrix publish
    # workflow covers real image builds on release tags; this job is
    # the fast "does every entrypoint run and produce valid JSON?"
    # gate against a stdlib mock engine.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install smoke-test deps
        run: pip install httpx==0.27.2 pyyaml==6.0.2 jsonschema==4.23.0
      - name: Run smoke test
        run: python3 benchmarks-reference/tools/smoke_test.py
