name: Publish Benchmark Images

# Builds and pushes every reference benchmark container image to GHCR
# on release tags (v*). Mirrors the KARR/BONNIE release workflow
# layout: matrix over benchmark directories, login to ghcr, build +
# push with :VERSION and :latest tags.
#
# Tag format: "vX.Y.Z" — the leading "v" is stripped for the image
# tag. Images land at ghcr.io/flag-ai/kitt-<name>:<version> and
# ghcr.io/flag-ai/kitt-<name>:latest.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (defaults to the git tag without the leading v)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: yaml-runner
            context: benchmarks-reference/kitt-yaml-runner
          - name: humaneval
            context: benchmarks-reference/containers/humaneval
          - name: vlm
            context: benchmarks-reference/containers/vlm
          - name: rag-pipeline
            context: benchmarks-reference/containers/rag-pipeline
          - name: function-calling
            context: benchmarks-reference/containers/function-calling
          - name: throughput
            context: benchmarks-reference/containers/throughput
          - name: latency
            context: benchmarks-reference/containers/latency
          - name: memory
            context: benchmarks-reference/containers/memory
          - name: streaming-latency
            context: benchmarks-reference/containers/streaming-latency
          - name: long-context
            context: benchmarks-reference/containers/long-context
          - name: tensor-parallel
            context: benchmarks-reference/containers/tensor-parallel
          - name: speculative-decoding
            context: benchmarks-reference/containers/speculative-decoding
          - name: warmup-analysis
            context: benchmarks-reference/containers/warmup-analysis
          - name: multiturn
            context: benchmarks-reference/containers/multiturn
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF#refs/tags/}"
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/flag-ai/kitt-${{ matrix.name }}:${{ steps.version.outputs.version }}
            ghcr.io/flag-ai/kitt-${{ matrix.name }}:latest
          # Provenance/SBOM off to keep the matrix fast; enable later
          # once the reference images need supply-chain attestation.
          provenance: false
          sbom: false
