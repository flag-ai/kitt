version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  exclusions:
    paths:
      - "web/node_modules"
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - gosec
    - prealloc
    - unconvert
    - unparam
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gosec:
      excludes:
        - G104

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
